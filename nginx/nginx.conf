# ============================================
# Nginx Configuration - Rimba Nusantara Frontend
# Serve React SPA + Reverse Proxy ke Backend API
# ============================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==================== Gzip Compression ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ==================== Brotli (jika pre-compressed oleh Vite) ====================
    gzip_static on;

    # ==================== Security Headers ====================
    # CSP & security headers dimuat dari file terpisah untuk menghindari duplikasi
    include /etc/nginx/security-headers.conf;

    # ==================== Health Check Endpoint ====================
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    # nginx/nginx.conf — tambahkan preload hint untuk vendor-react
# agar browser tahu harus load react duluan
    add_header Link "</assets/js/vendor-react-*.js>; rel=preload; as=script";
    
    # ==================== Reverse Proxy ke Backend API ====================
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Upload file support (max 10MB sesuai multer default)
        client_max_body_size 10m;
    }

    # ==================== Proxy untuk file uploads dari backend ====================
    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        expires 7d;
        add_header Cache-Control "public, immutable";

        # Re-include security headers (wajib karena add_header di location menimpa level server)
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Static Assets (JS, CSS, images) ====================
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Favicon & Static Files ====================
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== React SPA Fallback ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== Deny Hidden Files ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
