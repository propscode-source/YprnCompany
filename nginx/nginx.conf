# ============================================
# Nginx Configuration - Rimba Nusantara Frontend
# Serve React SPA + Reverse Proxy ke Backend API
# ============================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==================== Security Headers ====================
    # Sembunyikan versi Nginx untuk keamanan
    server_tokens off;

    # ==================== Gzip Compression ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Keseimbangan optimal CPU dan rasio kompresi
    gzip_min_length 1024;
    # Tambahkan MIME types komprehensif untuk gzip modern
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        image/x-icon
        image/bmp
        font/woff2;

    # ==================== Brotli & Gzip Pre-compressed ====================
    # Sajikan file .gz bawaan dari Vite (vite-plugin-compression2) tanpa kompresi on-the-fly
    gzip_static on;

    # ==================== Timeout Protection (Slowloris Anti-DDoS) ====================
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;


    # ==================== Security Headers ====================
    # CSP & security headers dimuat dari file terpisah untuk menghindari duplikasi
    include /etc/nginx/security-headers.conf;

    # ==================== Health Check Endpoint ====================
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    # nginx/nginx.conf — tambahkan preload hint untuk vendor-react
# agar browser tahu harus load react duluan
    add_header Link "</assets/js/vendor-react-*.js>; rel=preload; as=script";
    
    # ==================== Reverse Proxy ke Backend API ====================
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Upload file support (max 10MB sesuai multer default)
        client_max_body_size 10m;
    }

    # ==================== Proxy untuk file uploads dari backend ====================
    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        expires 7d;
        add_header Cache-Control "public, immutable";

        # Re-include security headers (wajib karena add_header di location menimpa level server)
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Static Assets (JS, CSS dari Vite) ====================
    # File JS/CSS dari Vite memiliki hash unik, jadi aman di-cache maksimum (1 tahun)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Media & Font Caching ====================
    location ~* \.(ico|png|jpg|jpeg|gif|webp|avif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== React SPA Fallback & No-Cache Entrypoint ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PENTING: Jangan cache index.html agar user selalu mendapat versi /assets/ terbaru
    # saat ada deployment baru
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Deny Hidden Files ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
