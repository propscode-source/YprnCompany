# ============================================
# Nginx Configuration - Rimba Nusantara Frontend
# Serve React SPA + Reverse Proxy ke Backend API
# ============================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==================== Gzip Compression ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ==================== Brotli (jika pre-compressed oleh Vite) ====================
    gzip_static on;

    # ==================== Security Headers ====================
    # CSP sudah diperbaiki: Penambahan wildcard pada frame-src dan fonts.googleapis.com pada style-src
    add_header Content-Security-Policy "default-src 'self'; frame-src 'self' https://www.google.com https://*.google.com http://*.googleusercontent.com https://*.googleusercontent.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' https://rimbanusantara.or.id; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://rimbanusantara.or.id;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== Health Check Endpoint ====================
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ==================== Reverse Proxy ke Backend API ====================
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Upload file support (max 10MB sesuai multer default)
        client_max_body_size 10m;
    }

    # ==================== Proxy untuk file uploads dari backend ====================
    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        expires 7d;
        add_header Cache-Control "public, immutable";

        # Re-include security headers
        add_header Content-Security-Policy "default-src 'self'; frame-src 'self' https://www.google.com https://*.google.com http://*.googleusercontent.com https://*.googleusercontent.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' https://rimbanusantara.or.id; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://rimbanusantara.or.id;" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ==================== Static Assets (JS, CSS, images) ====================
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;

        # Re-include security headers
        add_header Content-Security-Policy "default-src 'self'; frame-src 'self' https://www.google.com https://*.google.com http://*.googleusercontent.com https://*.googleusercontent.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' https://rimbanusantara.or.id; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://rimbanusantara.or.id;" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ==================== Favicon & Static Files ====================
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;

        # Re-include security headers
        add_header Content-Security-Policy "default-src 'self'; frame-src 'self' https://www.google.com https://*.google.com http://*.googleusercontent.com https://*.googleusercontent.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' https://rimbanusantara.or.id; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://rimbanusantara.or.id;" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ==================== React SPA Fallback ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== Deny Hidden Files ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
