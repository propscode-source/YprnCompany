# ============================================
# Nginx Configuration - Rimba Nusantara Frontend
# Serve React SPA + Reverse Proxy ke Backend API
# ============================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==================== Security Headers ====================
    # Sembunyikan versi Nginx untuk keamanan
    server_tokens off;

    # ==================== Gzip Compression ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Keseimbangan optimal CPU dan rasio kompresi
    gzip_min_length 1024;
    # Tambahkan MIME types komprehensif untuk gzip modern
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        image/x-icon
        image/bmp
        font/woff2;

    # ==================== Brotli & Gzip Pre-compressed ====================
    # Sajikan file .gz bawaan dari Vite (vite-plugin-compression2) tanpa kompresi on-the-fly
    gzip_static on;

    # ==================== Timeout Protection (Slowloris Anti-DDoS) ====================
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;


    # ==================== Security Headers ====================
    # CSP & security headers dimuat dari file terpisah untuk menghindari duplikasi
    include /etc/nginx/security-headers.conf;

    # ==================== Health Check Endpoint ====================
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ==================== Reverse Proxy ke Backend API ====================
    # Header khusus untuk memastikan Cloudflare tidak blokir request API:
    # - proxy_set_header Host          → pastikan SNI match dengan domain Cloudflare
    # - proxy_set_header X-Real-IP     → IP asli client untuk logging backend
    # - proxy_hide_header CF-RAY       → jangan expose Cloudflare internal header ke client
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;

        # Host header harus match domain Cloudflare agar tidak dianggap bot
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # Upgrade connection untuk WebSocket/keep-alive
        proxy_set_header Connection          "";
        proxy_set_header Accept              "application/json";

        # Matikan proxy buffering agar JSON response langsung ke client
        # tanpa tertahan di nginx (penting untuk debugging API tester)
        proxy_buffering            off;
        proxy_request_buffering    off;

        # Sembunyikan header internal Cloudflare dari response ke API tester
        proxy_hide_header CF-RAY;
        proxy_hide_header CF-Cache-Status;
        proxy_hide_header CF-Connecting-IP;
        proxy_hide_header Report-To;
        proxy_hide_header NEL;

        # CATATAN: Content-Type TIDAK di-set oleh nginx, melainkan dari upstream backend.
        # Backend Express sudah mengatur Content-Type: application/json di setiap response.
        # Jika di-set di nginx, akan override Content-Type multipart untuk upload file.

        # Timeout settings
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Upload file support (max 50MB untuk video upload)
        client_max_body_size 110m;

        # Timeout upload video besar — naikkan dari 60s
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Proxy untuk file uploads dari backend ====================
    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";

        # Re-include security headers (wajib karena add_header di location menimpa level server)
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Static Assets (JS, CSS dari Vite) ====================
    # File JS/CSS dari Vite memiliki hash unik, jadi aman di-cache maksimum (1 tahun)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Media & Font Caching ====================
    location ~* \.(ico|png|jpg|jpeg|gif|webp|avif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== React SPA Fallback & No-Cache Entrypoint ====================
    location / {
        try_files $uri $uri/ /index.html;

        # Re-include security headers
        include /etc/nginx/security-headers.conf;

        # CATATAN: Header Link preload untuk vendor JS dihapus karena hash filename
        # berubah setiap build sehingga nama file cepat stale dan memicu preload warning.
    }

    # PENTING: Jangan cache index.html agar user selalu mendapat versi /assets/ terbaru
    # saat ada deployment baru
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Re-include security headers
        include /etc/nginx/security-headers.conf;
    }

    # ==================== Deny Hidden Files ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
