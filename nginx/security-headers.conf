# ============================================
# Security Headers - Reusable Include
# Digunakan oleh nginx.conf untuk menghindari duplikasi
# ============================================

# Content-Security-Policy yang mendukung Google Maps Embed secara penuh
add_header Content-Security-Policy "default-src 'self'; frame-src 'self' https://www.google.com https://*.google.com https://*.google.co.id https://*.googleusercontent.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; media-src 'self' https://rimbanusantara.or.id; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://rimbanusantara.or.id https://*.googleapis.com https://*.google.com https://*.gstatic.com; worker-src 'self' blob:;" always;

# Mencegah halaman ditampilkan dalam iframe oleh domain lain
add_header X-Frame-Options "SAMEORIGIN" always;

# Mencegah browser menebak MIME type (sniffing)
add_header X-Content-Type-Options "nosniff" always;

# Proteksi XSS bawaan browser (legacy, tapi masih berguna)
add_header X-XSS-Protection "1; mode=block" always;

# Mengontrol informasi referrer yang dikirim
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
