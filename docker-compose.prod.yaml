# ============================================================
# Docker Compose - YPRN Production (Stack Baru)
# FILE INI INDEPENDEN — tidak konflik dengan stack existing
# ... (Komentar awal tetap sama) ...
# ============================================================

name: yprn-prod

services:

  # ==================== PostgreSQL Database ====================
  db:
    image: postgres:16-alpine
    container_name: yprn-postgres-prod
    restart: unless-stopped
    ports:
      - "${PROD_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${PROD_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PROD_POSTGRES_DB:-mycompany_prod}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
      - ./backend/database/migration.sql:/docker-entrypoint-initdb.d/01-migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_POSTGRES_USER:-postgres} -d ${PROD_POSTGRES_DB:-mycompany_prod}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - yprn-prod-network

  # ==================== Fix #3: Init Container untuk Volumes ====================
  uploads-init:
    image: alpine:latest
    container_name: yprn-uploads-init
    # Harus pakai user root untuk bisa melakukan chown
    user: root
    volumes:
      # PENTING: Mount volume yang sama persis dengan yang dipakai api
      - uploads-prod:/app/uploads
    # Script satpam: bikin folder, set ownership ke user aplikasi, dan ubah izin akses
    command: >
      sh -c "
        mkdir -p /app/uploads/beranda /app/uploads/kegiatan /app/uploads/sia /app/uploads/sroi /app/uploads/video &&
        chown -R 1000:1000 /app/uploads &&
        chmod -R 755 /app/uploads &&
        echo 'Upload directories initialized and permissions fixed'
      "
    networks:
      - yprn-prod-network

  # ==================== Express API Backend ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: yprn-api-prod:latest
    container_name: yprn-api-prod
    restart: unless-stopped
    ports:
      - "${PROD_API_PORT:-5001}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: >-
        postgresql://${PROD_POSTGRES_USER:-postgres}:${PROD_POSTGRES_PASSWORD_ENCODED}@db:5432/${PROD_POSTGRES_DB:-mycompany_prod}
      JWT_SECRET: ${PROD_JWT_SECRET}
      JWT_EXPIRES_IN: ${PROD_JWT_EXPIRES_IN:-24h}
    volumes:
      - uploads-prod:/app/uploads
    depends_on:
      # API baru menyala setelah database siap
      db:
        condition: service_healthy
      # API baru menyala setelah Satpam (uploads-init) selesai bekerja
      uploads-init:
        condition: service_completed_successfully
    # Healthcheck diperlukan agar frontend tahu kapan api sudah siap
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yprn-prod-network

  # ==================== React Frontend + Nginx ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
    image: yprn-frontend-prod:latest
    container_name: yprn-frontend-prod
    restart: unless-stopped
    ports:
      - "${PROD_FRONTEND_PORT:-8181}:80"
    depends_on:
      # Frontend butuh healthcheck dari api agar tidak error "service_healthy tidak ditemukan"
      api:
        condition: service_healthy
    networks:
      - yprn-prod-network

  # ==================== pgAdmin (Opsional) ====================
  pgadmin:
    # ... (Biarkan sama seperti milik Anda sebelumnya)
    image: dpage/pgadmin4:latest
    container_name: yprn-pgadmin-prod
    restart: unless-stopped
    ports:
      - "${PROD_PGADMIN_PORT:-8182}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PROD_PGADMIN_EMAIL:-admin@yprn.local}
      PGADMIN_DEFAULT_PASSWORD: ${PROD_PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data-prod:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yprn-prod-network
    profiles:
      - tools

# ==================== Volumes ====================
volumes:
  pgdata-prod:
    driver: local
    name: yprn-pgdata-prod
  uploads-prod:
    driver: local
    name: yprn-uploads-prod
  pgadmin-data-prod:
    driver: local
    name: yprn-pgadmin-data-prod

# ==================== Networks ====================
networks:
  yprn-prod-network:
    driver: bridge
    name: yprn-prod-network
